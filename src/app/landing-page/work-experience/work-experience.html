<section>
    <div class="section-item section-full justify-content-start" style="auto">
        <div class="flex align-items-end mb-1" style="height: 3vh">
            <h2 class="subheadline">
                {{ 'work.experience.title' | translate }}
            </h2>
        </div>
        <div class="divider"></div>

        <div class="work-grid mt-5 justify-content-between w-full gap-5">
            @for (exp of experiences(); track exp.company) {
                <div class="flex flex-column">
                    <h3 class="subheadline">{{ exp.company }}</h3>
                    <p class="text-sm">{{ exp.role | translate }}</p>
                    <p class="text-sm">{{ exp.period | translate }}</p>
                    <div class="divider mb-2"></div>
                    <p>
                        {{ exp.description | translate }}
                    </p>
                </div>
            }
        </div>
    </div>
</section>
