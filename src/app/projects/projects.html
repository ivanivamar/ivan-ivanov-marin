<div class="grid grid-nogutter p-5">
    @for (project of projects; track project.title; let index = $index) {
        <div class="col-12 md:col-4">
            <div class="flex flex-column gap-3 px-2">
                <header class="flex align-items-center gap-3">
                    <h4 class="color-blue font-bold m-0">
                        Project {{ index + 1 }}
                    </h4>
                    <span class="color-grey">
                        // {{ project.title }}
                </span>
                </header>
                <div class="card">
                    <div class="card-header" [style.background-image]="'url(' + project.image + ')'">
                    </div>

                    <div class="card-body">
                        <span>
                            {{ project.description }}
                        </span>
                        <button class="btn secondary">
                            view-project
                        </button>
                    </div>
                </div>
            </div>
        </div>
    }
</div>
