<section class="container pb-5 flex flex-column gap-5 fadein animation-duration-800">
    <header class="flex flex-column gap-3 sticky bg-color pt-5" style="top: 28px;">
        <button class="btn-icon text" [routerLink]="['/projects']">
            <i class="material-symbols-rounded">arrow_back</i>
        </button>

        <h1 class="color-blue uppercase">
            {{ title$ }}
        </h1>
    </header>

    <app-markdown-renderer [markdownRoute]="'projects/' + title$"></app-markdown-renderer>
</section>
